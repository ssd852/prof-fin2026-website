// ─── STORE ───
function useStore(){
    const[data,setData]=React.useState(()=>{try{const s=localStorage.getItem('legendaryFinPro');return s?JSON.parse(s):INIT}catch{return INIT}});
    React.useEffect(()=>{localStorage.setItem('legendaryFinPro',JSON.stringify(data))},[data]);
    const getAll=e=>data[e]||[];
    const getById=(e,id)=>(data[e]||[]).find(i=>i.id===Number(id));
    const add=(e,r)=>{setData(p=>{const l=p[e]||[];const mx=l.reduce((m,i)=>Math.max(m,i.id||0),0);return{...p,[e]:[...l,{...r,id:mx+1}]}})};
    const update=(e,id,u)=>{setData(p=>({...p,[e]:(p[e]||[]).map(i=>i.id===id?{...i,...u}:i)}))};
    const remove=(e,id)=>{setData(p=>({...p,[e]:(p[e]||[]).filter(i=>i.id!==id)}))};
    const addLog=(role,action,table,rid)=>{setData(p=>{const logs=p.audit_logs||[];return{...p,audit_logs:[...logs,{id:logs.length+1,user_role:role,action,table_name:table,record_id:rid,timestamp:new Date().toLocaleString('ar-SA')}]}})};
    const reset=()=>{setData(INIT);localStorage.removeItem('legendaryFinPro')};
    const getStats=()=>{
        const a=data.accounts||[],cu=data.customers||[],ch=data.checks||[],si=data.sales_invoices||[],pi=data.purchase_invoices||[];
        return{
            totalLiquidity:a.reduce((s,x)=>s+(Number(x.balance)||0),0),
            activeCustomers:cu.length,
            pendingChecks:ch.filter(c=>c.status==='معلق').length,
            pendingChecksValue:ch.filter(c=>c.status==='معلق').reduce((s,c)=>s+(Number(c.value)||0),0),
            totalSales:si.reduce((s,i)=>s+(Number(i.total_value)||0),0),
            totalPurchases:pi.reduce((s,i)=>s+(Number(i.total_value)||0),0),
            netProfit:si.reduce((s,i)=>s+(Number(i.total_value)||0),0)-pi.reduce((s,i)=>s+(Number(i.total_value)||0),0),
            totalVAT:si.reduce((s,i)=>s+(Number(i.vat_tax)||0),0),
            overLimitCustomers:cu.filter(c=>(Number(c.balance)||0)>(Number(c.credit_limit)||0)).length,
            weekChecks:ch.filter(c=>{if(c.status!=='معلق')return false;const d=new Date(c.due_date),now=new Date(),diff=(d-now)/(864e5);return diff>=0&&diff<=7}),
        }
    };
    return{data,getAll,getById,add,update,remove,addLog,reset,getStats};
}

function Ic({name,size=17,className='',color}){const ref=React.useRef(null);React.useEffect(()=>{if(ref.current){ref.current.innerHTML='';try{const el=lucide.createElement(lucide.icons[name]);if(el){el.setAttribute('width',size);el.setAttribute('height',size);if(color)el.setAttribute('stroke',color);ref.current.appendChild(el)}}catch(e){}}},[name,size,color]);return<span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{width:size,height:size}}/>}

function BarChart({data,width,height}){const[tip,setTip]=React.useState(null);const{fc}=useG();const mx=Math.max(...data.map(d=>Math.max(d.inflow,d.outflow)));const pad={t:18,r:14,b:34,l:52};const cW=width-pad.l-pad.r;const cH=height-pad.t-pad.b;const bW=cW/data.length;const ibW=bW*.32;const yT=[0,.25,.5,.75,1].map(p=>Math.round(mx*p));return<svg width={width} height={height} style={{overflow:'visible'}}><defs><linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#22d3ee" stopOpacity=".8"/><stop offset="100%" stopColor="#06b6d4" stopOpacity=".45"/></linearGradient><linearGradient id="og" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a78bfa" stopOpacity=".8"/><stop offset="100%" stopColor="#8b5cf6" stopOpacity=".45"/></linearGradient></defs>{yT.map((v,i)=>{const y=pad.t+cH-(v/mx)*cH;return<g key={i}><line x1={pad.l} y1={y} x2={width-pad.r} y2={y} stroke="rgba(148,163,184,.04)" strokeDasharray="3 3"/><text x={pad.l-5} y={y+3} textAnchor="end" fill="#64748b" fontSize="9" fontFamily="IBM Plex Sans Arabic">{(v/1000)}K</text></g>})}{data.map((d,i)=>{const x=pad.l+i*bW;const iH=(d.inflow/mx)*cH;const oH=(d.outflow/mx)*cH;return<g key={i} onMouseEnter={()=>setTip({x:x+bW/2,...d})} onMouseLeave={()=>setTip(null)} style={{cursor:'pointer'}}><rect x={x+bW/2-ibW-1} y={pad.t+cH-iH} width={ibW} height={iH} fill="url(#ig)" rx="3"/><rect x={x+bW/2+1} y={pad.t+cH-oH} width={ibW} height={oH} fill="url(#og)" rx="3"/><text x={x+bW/2} y={height-7} textAnchor="middle" fill="#64748b" fontSize="8.5" fontFamily="IBM Plex Sans Arabic">{d.month}</text></g>})}{tip&&<g><rect x={tip.x-82} y={5} width={164} height={50} rx="8" fill="rgba(15,23,42,.92)" stroke="rgba(148,163,184,.1)"/><text x={tip.x} y={21} textAnchor="middle" fill="white" fontSize="10" fontWeight="600" fontFamily="IBM Plex Sans Arabic">{tip.month}</text><text x={tip.x} y={35} textAnchor="middle" fill="#22d3ee" fontSize="9" fontFamily="IBM Plex Sans Arabic">إيرادات: {fc(tip.inflow)}</text><text function Donut({data,size}){const[hi,setHi]=React.useState(null);const cx=size/2,cy=size/2,oR=size/2-8,iR=oR*.58;const total=data.reduce((s,d)=>s+d.value,0);let cum=-90;const slices=data.map((d,i)=>{const ang=(d.value/total)*360;const sa=cum;cum+=ang;const ea=cum;const gap=2;const s1=(sa+gap/2)*Math.PI/180,e1=(ea-gap/2)*Math.PI/180;const la=ang-gap>180?1:0;const r=hi===i?oR+3:oR,ir=hi===i?iR-2:iR;const path=[`M ${cx+r*Math.cos(s1)} ${cy+r*Math.sin(s1)}`,`A ${r} ${r} 0 ${la} 1 ${cx+r*Math.cos(e1)} ${cy+r*Math.sin(e1)}`,`L ${cx+ir*Math.cos(e1)} ${cy+ir*Math.sin(e1)}`,`A ${ir} ${ir} 0 ${la} 0 ${cx+ir*Math.cos(s1)} ${cy+ir*Math.sin(s1)}`,'Z'].join(' ');return{...d,path,pct:((d.value/total)*100).toFixed(1)}});return<svg width={size} height={size} style={{overflow:'visible'}}><defs>{data.map((d,i)=><linearGradient key={i} id={`pg${i}`} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor={d.color} stopOpacity=".88"/><stop offset="100%" stopColor={d.color} stopOpacity=".5"/></linearGradient>)}</defs>{slices.map((s,i)=><path key={i} d={s.path} fill={`url(#pg${i})`} onMouseEnter={()=>setHi(i)} onMouseLeave={()=>setHi(null)} style={{transition:'all .2s ease',cursor:'pointer',filter:hi===i?'brightness(1.2)':'none'}}/>)}{hi!==null?<><text x={cx} y={cy-4} textAnchor="middle" fill="white" fontSize="11" fontWeight="700" fontFamily="IBM Plex Sans Arabic">{data[hi].name}</text><text x={cx} y={cy+10} textAnchor="middle" fill="#94a3b8" fontSize="9.5" fontFamily="IBM Plex Sans Arabic">{slices[hi].pct}%</text></>:<><text x={cx} y={cy-2} textAnchor="middle" fill="white" fontSize="12" fontWeight="700" fontFamily="IBM Plex Sans Arabic">الإجمالي</text><text x={cx} y={cy+12} textAnchor="middle" fill="#94a3b8" fontSize="9.5" fontFamily="IBM Plex Sans Arabic">{(total/1e6).toFixed(1)}M</text></>}</svg>}

        const projected=liq+Math.round(2200000*(1+Math.random()*.3))-Math.round(1600000*(1+Math.random()*.2))-dueThisMonth;
        liq=projected;
        return{month:m,value:projected,incoming:dueThisMonth};
    });
    const mn=Math.min(...pts.map(p=>p.value));const mx=Math.max(...pts.map(p=>p.value));
    const pad={t:20,r:14,b:34,l:55};const cW=width-pad.l-pad.r;const cH=height-pad.t-pad.b;
    const getX=i=>pad.l+(i/(pts.length-1))*cW;
    const getY=v=>pad.t+cH-((v-mn)/(mx-mn||1))*cH;
    const linePath=pts.map((p,i)=>`${i===0?'M':'L'} ${getX(i)} ${getY(p.value)}`).join(' ');
    const areaPath=linePath+` L ${getX(pts.length-1)} ${pad.t+cH} L ${getX(0)} ${pad.t+cH} Z`;
    return<svg width={width} height={height} style={{overflow:'visible'}}>
        <defs><linearGradient id="predGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10b981" stopOpacity=".15"/><stop offset="100%" stopColor="#10b981" stopOpacity=".01"/></linearGradient><linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#10b981"/><stop offset="100%" stopColor="#06b6d4"/></linearGradient></defs>
        {[0,.25,.5,.75,1].map((p,i)=>{const v=mn+(mx-mn)*p;const y=getY(v);return<g key={i}><line x1={pad.l} y1={y} x2={width-pad.r} y2={y} stroke="rgba(148,163,184,.04)" strokeDasharray="3 3"/><text x={pad.l-5} y={y+3} textAnchor="end" fill="#64748b" fontSize="9" fontFamily="IBM Plex Sans Arabic">{(v/1e6).toFixed(1)}M</text></g>})}
        <path d={areaPath} fill="url(#predGrad)"/>
        <path d={linePath} fill="none" stroke="url(#lineGrad)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=><g key={i}><circle cx={getX(i)} cy={getY(p.value)} r={tip?.i===i?5:3.5} fill={tip?.i===i?"#10b981":"#0f172a"} stroke="#10b981" strokeWidth="2" onMouseEnter={()=>setTip({...p,i})} onMouseLeave={()=>setTip(null)} style={{cursor:'pointer',transition:'r .15s ease'}}/><text x={getX(i)} y={height-7} textAnchor="middle" fill="#64748b" fontSize="8.5" fontFamily="IBM Plex Sans Arabic">{p.month}</text></g>)}
        {tip&&<g><rect x={getX(tip.i)-78} y={getY(tip.value)-52} width={156} height={42} rx="8" fill="rgba(15,23,42,.92)" stroke="rgba(148,163,184,.1)"/><text x={getX(tip.i)} y={getY(tip.value)-32} textAnchor="middle" fill="#10b981" fontSize="10" fontWeight="600" fontFamily="IBM Plex Sans Arabic">سيولة متوقعة: {fc(tip.value)}</text><text x={getX(tip.i)} y={getY(tip.value)-18} textAnchor="middle" fill="#fbbf24" fontSize="9" fontFamily="IBM Plex Sans Arabic">شيكات مستحقة: {fc(tip.incoming)}</text></g>}
    </svg>;
}

function DynamicForm({schema,entityKey,initialData,onSubmit,onCancel,store}){

    const fields=schema.fields.filter(f=>!f.auto);

    const hc=(k,v)=>setFd(p=>({...p,[k]:v}));
    const hs=e=>{e.preventDefault();const proc={...fd};fields.forEach(f=>{if(f.type==='number'||f.currency)proc[f.key]=Number(proc[f.key])||0});
        if(isInvoice){proc.vat_tax=Math.round(proc.subtotal*VAT_RATE);proc.total_value=proc.subtotal+proc.vat_tax;if(entityKey==='sales_invoices')proc.qr_code_hash=`QR-SI-${String(Date.now()).slice(-6)}`}

        })}</div>

            <div className="flex justify-between text-[12px]"><span className="text-surface-400">ض.ق.م 16%</span><span className="text-amber-400">{vatCalc.toLocaleString('ar-SA')}</span></div>
            <div className="border-t border-white/5 pt-1.5 flex justify-between text-[13px] font-bold"><span className="text-white">الإجمالي</span><span className="text-cyan-400">{(subtotal+vatCalc).toLocaleString('ar-SA')}</span></div>

            </form>
            <div className="mt-5 pt-4 border-t border-white/5"><p className="text-[10.5px] text-surface-500 text-center mb-2">حسابات تجريبية للعرض:</p><div className="grid grid-cols-3 gap-2">{CREDS.map(c=><div key={c.user} className="text-center p-2 rounded-lg bg-white/[0.02] border border-white/5 hover:bg-white/[0.04] cursor-pointer transition-colors" onClick={()=>{setU(c.user);setP(c.pass)}}><p className="text-[10px] font-bold text-cyan-400">{c.label}</p><p className="text-[9px] text-surface-500 mt-0.5">{c.user} / {c.pass}</p></div>)}</div></div>
        </div>
    </div>;
}

// ─── SIDEBAR ───
function Sidebar({active,onNav,isOpen,onClose}){
    const{auth,logout,role}=useG();
    const items=[{key:'dashboard',label:'لوحة التحكم',icon:'layout-dashboard'},...Object.entries(SCHEMAS).map(([k,s])=>({key:k,label:s.name,icon:s.icon})),{key:'pnl',label:'الأرباح والخسائر',icon:'bar-chart-3'}];
    return<>{isOpen&&<div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={onClose}/>}
    <aside className={`sidebar fixed md:relative right-0 top-0 bottom-0 w-56 z-40 flex flex-col transition-transform duration-300 ${isOpen?'translate-x-0':'translate-x-full md:translate-x-0'}`}>
        <div className="p-4 border-b border-white/5"><div className="flex items-center gap-2.5"><div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-violet-500 flex items-center justify-center"><Ic name="landmark" size={16} color="white"/></div><div><h1 className="text-[13px] font-bold text-white">المالية المتقدمة</h1><p className="text-[9px] text-surface-500">Legendary Finance Pro</p></div></div></div>
        <nav className="flex-1 p-2.5 space-y-0.5 overflow-y-auto">{items.map(i=><div key={i.key} className={`sidebar-item ${active===i.key?'active':''}`} onClick={()=>{onNav(i.key);onClose()}}><Ic name={i.icon} size={15}/><span>{i.label}</span></div>)}</nav>
        <div className="p-2.5 border-t border-white/5 space-y-1">
            {auth&&<div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-white/[0.02]"><div className="w-7 h-7 rounded-full bg-gradient-to-br from-cyan-500 to-violet-500 flex items-center justify-center"><Ic name="user" size={13} color="white"/></div><div className="flex-1 min-w-0"><p className="text-[11px] font-bold text-white truncate">{auth.label}</p><p className="text-[9px] text-surface-500">@{auth.user}</p></div><span className={`text-[8.5px] font-bold px-1.5 py-0.5 rounded-full shrink-0 ${role==='مدير'?'bg-emerald-500/12 text-emerald-400 border border-emerald-500/15':role==='محاسب'?'bg-amber-500/12 text-amber-400 border border-amber-500/15':'bg-violet-500/12 text-violet-400 border border-violet-500/15'}`}>{role}</span></div>}
            <div className="sidebar-item text-[11px] text-surface-500" onClick={()=>document.dispatchEvent(new CustomEvent('openCmd'))}><Ic name="command" size={13}/><span>Ctrl+K للبحث السريع</span></div>
            <div className="sidebar-item text-[11px] text-red-400/70 hover:text-red-400" onClick={logout}><Ic name="log-out" size={13}/><span>تسجيل الخروج</span></div>
        </div>
    </aside></>;
}

// ─── HEADER BAR ───
function Header({onToggle}){const{cur,setCur,role,auth,logout}=useG();
    return<div className="flex items-center justify-between px-4 py-2.5 glass border-b border-white/5 mb-3 rounded-xl mx-0.5" style={{background:'rgba(15,23,42,.45)'}}>
        <button className="btn-icon md:hidden" onClick={onToggle}><Ic name="menu" size={20} color="#94a3b8"/></button>
        <div className="flex items-center gap-3 mr-auto">
            <div className="flex items-center gap-1 bg-white/[0.03] rounded-lg p-0.5 border border-white/5">{['ILS','JOD'].map(c=><button key={c} onClick={()=>setCur(c)} className={`px-3 py-1 rounded-md text-[11px] font-bold transition-all ${cur===c?'bg-gradient-to-r from-cyan-500/15 to-violet-500/15 text-cyan-300 border border-cyan-500/12':'text-surface-500 hover:text-surface-300'}`}>{c==='ILS'?'₪ شيكل':'🇯🇴 دينار'}</button>)}</div>
            <span className={`text-[10px] font-bold px-2 py-1 rounded-full ${role==='مدير'?'bg-emerald-500/10 text-emerald-400 border border-emerald-500/15':role==='محاسب'?'bg-amber-500/10 text-amber-400 border border-amber-500/15':'bg-violet-500/10 text-violet-400 border border-violet-500/15'}`}><Ic name="shield" size={11} className="inline-flex ml-1"/>{role}</span>
            <button className="btn-icon" onClick={()=>document.dispatchEvent(new CustomEvent('openCmd'))} title="Ctrl+K"><Ic name="search" size={15} color="#64748b"/></button>
            <button className="btn-icon hover:bg-red-500/10" onClick={logout} title="تسجيل الخروج"><Ic name="log-out" size={15} color="#f87171"/></button>
        </div>
    </div>;
}

// ─── DASHBOARD ───
function DashboardPage({store,onToggle}){const{fc}=useG();const st=store.getStats();
    return<div className="space-y-4"><Header onToggle={onToggle}/>
        <div className="flex items-center justify-between"><div><h2 className="text-base font-bold text-white">لوحة التحكم</h2><p className="text-[11px] text-surface-400 mt-0.5">نظرة شاملة على الأداء المالي</p></div></div>
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2.5">
            <StatCard icon="banknote" label="إجمالي السيولة" value={fc(st.totalLiquidity)} color="cyan" trend={12.5}/>
            <StatCard icon="users" label="العملاء" value={String(st.activeCustomers)} color="violet" trend={8.3}/>
            <StatCard icon="clock" label="شيكات معلقة" value={`${st.pendingChecks}`} color="amber" sub={fc(st.pendingChecksValue)}/>
            <StatCard icon="trending-up" label="صافي الربح" value={fc(st.netProfit)} color="emerald" trend={15.7}/>
            <StatCard icon="alert-triangle" label="تجاوز الائتمان" value={`${st.overLimitCustomers} عميل`} color="rose"/>
        </div>
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
            <div className="lg:col-span-2 glass-card rounded-2xl p-4"><div className="flex items-center justify-between mb-4"><div><h3 className="text-[13px] font-bold text-white">التدفق النقدي</h3><p className="text-[10px] text-surface-500 mt-0.5">مقارنة الإيرادات والمصروفات</p></div><div className="flex items-center gap-3"><div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-cyan-400"/><span className="text-[10px] text-surface-400">إيرادات</span></div><div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-violet-400"/><span className="text-[10px] text-surface-400">مصروفات</span></div></div></div><ChartBox height={230}>{(w,h)=><BarChart data={CASHFLOW} width={w} height={h}/>}</ChartBox></div>
            <AIAdvisor store={store}/>
        </div>
        {/* Predictive + Donut */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
            <div className="lg:col-span-2 glass-card rounded-2xl p-4"><div className="flex items-center gap-2 mb-3"><Ic name="brain" size={16} color="#10b981"/><div><h3 className="text-[13px] font-bold text-white">التنبؤ بالسيولة المستقبلية</h3><p className="text-[10px] text-surface-500">تحليل تنبؤي مبني على الشيكات المستحقة</p></div><span className="mr-auto px-1.5 py-0.5 rounded text-[9px] font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/15">تنبؤي</span></div><ChartBox height={200}>{(w,h)=><PredictiveChart store={store} width={w} height={h}/>}</ChartBox></div>
            <div className="glass-card rounded-2xl p-4"><h3 className="text-[13px] font-bold text-white mb-1">توزيع الحسابات</h3><p className="text-[10px] text-surface-500 mb-2">توزيع الأرصدة حسب الحساب</p><div className="flex justify-center"><Donut data={ACCT_DIST} size={165}/></div><div className="grid grid-cols-2 gap-1 mt-2.5">{ACCT_DIST.map((i,x)=><div key={x} className="flex items-center gap-1.5"><div className="w-1.5 h-1.5 rounded-full" style={{backgroundColor:i.color}}/><span className="text-[9.5px] text-surface-400 truncate">{i.name}</span></div>)}</div></div>
        </div>
        {/* Recent lists */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
            <div className="glass-card rounded-2xl p-4"><h3 className="text-[13px] font-bold text-white mb-2">آخر فواتير المبيعات</h3><div className="space-y-1.5">{store.getAll('sales_invoices').slice(-5).reverse().map(inv=>{const c=store.getById('customers',inv.customer_id);return<div key={inv.id} className="flex items-center justify-between p-2 rounded-lg bg-white/[0.015] hover:bg-white/[0.03] transition-colors"><div className="flex items-center gap-2"><div className="w-7 h-7 rounded-md bg-cyan-500/10 flex items-center justify-center"><Ic name="receipt" size={13} color="#22d3ee"/></div><div><p className="text-[11.5px] font-medium text-surface-200">{inv.description}</p><p className="text-[9.5px] text-surface-500">{c?c.name:'—'}</p></div></div><div className="text-left flex items-center gap-2"><div className="qr-icon" title={inv.qr_code_hash}><Ic name="qr-code" size={13} color="#a78bfa"/></div><div><p className="text-[11.5px] font-bold text-emerald-400">+{fc(inv.total_value)}</p><p className="text-[9.5px] text-surface-500">{inv.date}</p></div></div></div>})}</div></div>
            <div className="glass-card rounded-2xl p-4"><h3 className="text-[13px] font-bold text-white mb-2">الشيكات المعلقة</h3><div className="space-y-1.5">{store.getAll('checks').filter(c=>c.status==='معلق').slice(0,5).map(ch=>{const c=store.getById('customers',ch.customer_id);return<div key={ch.id} className="flex items-center justify-between p-2 rounded-lg bg-white/[0.015] hover:bg-white/[0.03] transition-colors"><div className="flex items-center gap-2"><div className="w-7 h-7 rounded-md bg-amber-500/10 flex items-center justify-center"><Ic name="file-check" size={13} color="#fbbf24"/></div><div><p className="text-[11.5px] font-medium text-surface-200">{c?c.name:'—'}</p><p className="text-[9.5px] text-surface-500">استحقاق: {ch.due_date}</p></div></div><div className="text-left"><p className="text-[11.5px] font-bold text-amber-400">{fc(ch.value)}</p><span className="badge badge-pending text-[8.5px]">معلق</span></div></div>})}</div></div>
        </div>
    </div>;
}

// ─── ENTITY PAGE ───
function EntityPage({entityKey,store,onToggle}){
    const schema=SCHEMAS[entityKey];const data=store.getAll(entityKey);
    const isReadonly=schema.readonly;
    const[modalOpen,setModalOpen]=React.useState(false);const[editItem,setEditItem]=React.useState(null);
    const[search,setSearch]=React.useState('');const[page,setPage]=React.useState(1);
    const{show}=useToast();const{fc,canAdd,canEdit,canDelete,role,cur}=useG();
    const PP=8;

    const filtered=React.useMemo(()=>{if(!search.trim())return data;const q=search.toLowerCase();return data.filter(i=>Object.values(i).some(v=>String(v).toLowerCase().includes(q)))},[data,search]);
    const totalPages=Math.max(1,Math.ceil(filtered.length/PP));
    React.useEffect(()=>{setPage(1)},[search]);
    const paged=filtered.slice((page-1)*PP,page*PP);
    const visCols=schema.fields.filter(c=>!c.auto||(c.key==='vat_tax'||c.key==='total_value'));

    const handleSubmit=fd=>{if(editItem){store.update(entityKey,editItem.id,fd);store.addLog(role,'تعديل',schema.name,editItem.id);show('تم التحديث ✓')}else{store.add(entityKey,fd);store.addLog(role,'إضافة',schema.name,fd.id||0);show('تمت الإضافة ✓')};setModalOpen(false);setEditItem(null)};
    const handleDelete=id=>{store.remove(entityKey,id);store.addLog(role,'حذف',schema.name,id);show('تم الحذف ✓')};

    const valField=schema.fields.find(f=>f.currency&&!f.auto);
    const total=valField?data.reduce((s,i)=>s+(Number(i[valField.key])||0),0):0;
    const isOverLimit=row=>entityKey==='customers'&&(Number(row.balance)||0)>(Number(row.credit_limit)||0);

    const fmtVal=(col,val)=>{
        if(col.currency)return fc(val);
        if(col.type==='select'&&col.source){const r=store.getById(col.source,val);return r?r.name:val}
        if(col.key==='status'){const sc=val==='مدفوع'?'badge-paid':val==='مرتجع'?'badge-bounced':'badge-pending';return<span className={`badge ${sc}`}>{val}</span>}
        if(col.key==='entry_type'){const ec=val==='دائن'?'badge-paid':val==='مدين'?'badge-bounced':'badge-pending';return<span className={`badge ${ec}`}>{val}</span>}
        if(col.key==='qr_code_hash'&&val)return<div className="qr-icon" title={val}><Ic name="qr-code" size={12} color="#a78bfa"/></div>;
        return val;
    };

    return<div><Header onToggle={onToggle}/>
        <div className="flex items-center justify-between mb-3"><div><h2 className="text-base font-bold text-white">{schema.name}</h2><p className="text-[11px] text-surface-400 mt-0.5">إدارة بيانات {schema.name} — {data.length} سجل</p></div>
        {!isReadonly&&canAdd&&<button className="btn-primary flex items-center gap-1.5" onClick={()=>{setEditItem(null);setModalOpen(true)}}><Ic name="plus" size={14} color="white"/><span>إضافة جديد</span></button>}</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-2.5">
            <div className="glass-card rounded-lg p-2.5"><p className="text-[10px] text-surface-500 mb-0.5">عدد السجلات</p><p className="text-[15px] font-bold text-white">{data.length}</p></div>
            {valField&&<div className="glass-card rounded-lg p-2.5"><p className="text-[10px] text-surface-500 mb-0.5">إجمالي {valField.label}</p><p className="text-[15px] font-bold text-cyan-400">{fc(total)}</p></div>}
            <div className="glass-card rounded-lg p-2.5"><p className="text-[10px] text-surface-500 mb-0.5">آخر تحديث</p><p className="text-[15px] font-bold text-surface-300">{new Date().toLocaleDateString('ar-SA')}</p></div>
        </div>
        <div className="flex items-center gap-2 mb-2.5">
            <div className="relative flex-1"><div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"><Ic name="search" size={13} color="#475569"/></div><input className="form-input" style={{paddingRight:'34px',fontSize:'12.5px'}} placeholder={`البحث في ${schema.name}...`} value={search} onChange={e=>setSearch(e.target.value)}/></div>
            {!isReadonly&&<><button className="export-btn export-pdf" onClick={()=>exportPDF(schema.name,schema.fields,data,cur)}><Ic name="file-text" size={12} color="#f87171"/>PDF</button><button className="export-btn export-excel" onClick={()=>exportExcel(schema.name,schema.fields,data)}><Ic name="table" size={12} color="#34d399"/>Excel</button></>}
        </div>
        <div className="overflow-auto rounded-2xl glass" style={{maxHeight:'calc(100vh - 380px)'}}><table className="data-table"><thead><tr>{visCols.map(col=><th key={col.key}>{col.label}</th>)}{!isReadonly&&<th style={{width:80}}>الإجراءات</th>}</tr></thead><tbody>
            {paged.length===0?<tr><td colSpan={visCols.length+(isReadonly?0:1)} className="text-center py-8 text-surface-500"><Ic name="inbox" size={30} className="mx-auto mb-1.5 opacity-20"/><p className="text-[12px]">لا توجد بيانات</p></td></tr>:
            paged.map(row=><tr key={row.id} className={isOverLimit(row)?'row-warning':''}>
                {visCols.map(col=><td key={col.key}>{col.key==='name'&&isOverLimit(row)?<span className="flex items-center gap-1">{row.name}<Ic name="alert-triangle" size={12} color="#f87171"/></span>:fmtVal(col,row[col.key])}</td>)}
                {!isReadonly&&<td><div className="flex gap-0.5">
                    {canEdit&&<button className="btn-icon" onClick={()=>{setEditItem(row);setModalOpen(true)}}><Ic name="pencil" size={13} color="#22d3ee"/></button>}
                    {canDelete?<button className="btn-icon" onClick={()=>handleDelete(row.id)}><Ic name="trash-2" size={13} color="#f87171"/></button>:<button className="btn-icon" disabled style={{opacity:.25,cursor:'not-allowed'}}><Ic name="lock" size={13} color="#94a3b8"/></button>}
                </div></td>}
            </tr>)}
        </tbody></table></div>
        {totalPages>1&&<div className="flex items-center justify-center gap-1 mt-2.5"><button className="pag-btn" disabled={page===1} onClick={()=>setPage(p=>p-1)}>السابق</button>{Array.from({length:totalPages},(_,i)=>i+1).map(p=><button key={p} className={`pag-btn ${page===p?'active':''}`} onClick={()=>setPage(p)}>{p}</button>)}<button className="pag-btn" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)}>التالي</button></div>}
        {!isReadonly&&<Modal isOpen={modalOpen} onClose={()=>{setModalOpen(false);setEditItem(null)}} title={editItem?`تعديل في ${schema.name}`:`إضافة إلى ${schema.name}`} wide={entityKey==='purchase_invoices'}>
            <DynamicForm schema={schema} entityKey={entityKey} initialData={editItem} onSubmit={handleSubmit} onCancel={()=>{setModalOpen(false);setEditItem(null)}} store={store}/>
        </Modal>}
    </div>;
}

// ─── MAIN APP ───
function MainApp(){
    const[section,setSection]=React.useState('dashboard');
    const[sidebarOpen,setSidebarOpen]=React.useState(false);
    const[cmdOpen,setCmdOpen]=React.useState(false);
    const[plOpen,setPlOpen]=React.useState(false);
    const store=useStore();
    const toggle=()=>setSidebarOpen(p=>!p);const close=()=>setSidebarOpen(false);

    // Ctrl+K handler
    React.useEffect(()=>{const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setCmdOpen(true)}if(e.key==='Escape')setCmdOpen(false)};const h2=()=>setCmdOpen(true);window.addEventListener('keydown',h);document.addEventListener('openCmd',h2);return()=>{window.removeEventListener('keydown',h);document.removeEventListener('openCmd',h2)}},[]);

    const handleNav=k=>{if(k==='pnl'){setPlOpen(true)}else{setSection(k)}};

    return<>
        <div className="flex h-screen overflow-hidden bg-surface-950 relative">
            <div className="gradient-orb animate-pulse-glow" style={{width:420,height:420,background:'linear-gradient(135deg,#06b6d4,#8b5cf6)',top:-120,left:-120}}/>
            <div className="gradient-orb animate-pulse-glow" style={{width:320,height:320,background:'linear-gradient(135deg,#8b5cf6,#ec4899)',bottom:-80,right:-80,animationDelay:'2.5s'}}/>
            <Sidebar active={section} onNav={handleNav} isOpen={sidebarOpen} onClose={close}/>
            <main className="flex-1 overflow-y-auto p-3 md:p-5 bg-grid relative">
                {section==='dashboard'?<DashboardPage store={store} onToggle={toggle}/>:<EntityPage key={section} entityKey={section} store={store} onToggle={toggle}/>}
            </main>
        </div>
        <CmdPalette isOpen={cmdOpen} onClose={()=>setCmdOpen(false)} store={store} onNavigate={handleNav}/>
        <PLModal isOpen={plOpen} onClose={()=>setPlOpen(false)} store={store}/>
    </>;
}

function App(){
    const{isLoggedIn}=useG();
    return isLoggedIn?<ToastProvider><MainApp/></ToastProvider>:<LoginPage/>;
}

function Root(){
    return<GProvider><App/></GProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
